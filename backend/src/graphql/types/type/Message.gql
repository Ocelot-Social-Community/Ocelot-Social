# input _MessageFilter {
#   room: _RoomFilter
# }

enum _MessageOrdering {
  indexId_desc
}

type Message {
  id: ID!
  indexId: Int!
  createdAt: String
  updatedAt: String

  content: String

  author: User! @relation(name: "CREATED", direction: "IN")
  room: Room! @relation(name: "INSIDE", direction: "OUT")

  senderId: String! @cypher(statement: "MATCH (this)<-[:CREATED]-(user:User) RETURN user.id")
  username: String! @cypher(statement: "MATCH (this)<-[:CREATED]-(user:User) RETURN user.name")
  avatar: String
    @cypher(
      statement: "MATCH (this)<-[:CREATED]-(:User)-[:AVATAR_IMAGE]->(image:Image) RETURN image.url"
    )
  date: String! @cypher(statement: "RETURN this.createdAt")

  saved: Boolean
  distributed: Boolean
  seen: Boolean
    @cypher(
      statement: """
      MATCH (this)<-[:CREATED]-(author:User)
      OPTIONAL MATCH (unseer:User)-[:HAS_NOT_SEEN]->(this)
      WHERE CASE
        WHEN author.id = $cypherParams.currentUserId THEN true
        ELSE unseer.id = $cypherParams.currentUserId
      END
      RETURN count(unseer) = 0
      """
    )
  files: [File]! @relation(name: "ATTACHMENT", direction: "OUT")
}

type Mutation {
  CreateMessage(roomId: ID, userId: ID, content: String, files: [FileInput]): Message

  MarkMessagesAsSeen(messageIds: [String!]): Boolean
}

type Query {
  Message(roomId: ID!, first: Int, offset: Int, orderBy: [_MessageOrdering]): [Message]
}

type ChatMessagesSeenPayload {
  roomId: ID!
  messageIds: [String!]!
}

type Subscription {
  chatMessageAdded: Message
  chatMessagesSeen: ChatMessagesSeenPayload
}
