query PostUnreadNotifications($id: ID!) {
  Post(filter: { id: $id }) {
    id
    unreadNotificationByCurrentUser {
      id
      reason
      read
      from {
        __typename
        ... on Post {
          id
        }
      }
    }
    unreadCommentNotificationsByCurrentUser {
      id
      reason
      read
      from {
        __typename
        ... on Comment {
          id
        }
      }
    }
  }
}
