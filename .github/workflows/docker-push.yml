name: docker-push

on: push

jobs:
  build-and-push-images:
    strategy:
      matrix:
        app:
          - name: neo4j
            context: neo4j
            file: neo4j/Dockerfile
            target: community
          - name: backend-base
            context: backend
            file: backend/Dockerfile
            target: base
          - name: backend-build
            context: backend
            file: backend/Dockerfile
            target: build
          - name: backend
            context: backend
            file: backend/Dockerfile
            target: production
          - name: webapp-base
            context: .
            file: webapp/Dockerfile
            target: base
          - name: webapp-build
            context: .
            file: webapp/Dockerfile
            target: build
          - name: webapp
            context: .
            file: webapp/Dockerfile
            target: production
          - name: maintenance-build
            context: .
            file: maintenance/Dockerfile
            target: build
          - name: maintenance
            context: .
            file: maintenance/Dockerfile
            target: production
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/${{ matrix.app.name }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha
      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.app.context }}
          target:  ${{ matrix.app.target }}
          file:  ${{ matrix.app.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}
