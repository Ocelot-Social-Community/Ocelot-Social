domain: stage.ocelot.social
cert_manager:
  issuer: # override default

global:
  image:
    pullPolicy: Always
    tag: latest

backend:
  image:
    repository: ocelotsocialnetwork/backend-stage-ocelot-social
  storage: "10Gi"
  env:
    PRODUCTION_DB_CLEAN_ALLOW: true
    PUBLIC_REGISTRATION: true
    INVITE_REGISTRATION: true
    CATEGORIES_ACTIVE:
    CLIENT_URI:
    EMAIL_DEFAULT_SENDER:
    SMTP_HOST:
    SMTP_PORT:
    SMTP_IGNORE_TLS:
    SMTP_SECURE:
    SMTP_DKIM_DOMAINNAME:
    SMTP_DKIM_KEYSELECTOR:

webapp:
  image:
    repository: ocelotsocialnetwork/webapp-stage-ocelot-social

maintenance:
  image:
    repository: ocelotsocialnetwork/maintenance-stage-ocelot-social

neo4j:
  image:
    repository: ocelotsocialnetwork/neo4j-community
  storage: "5Gi"
  env:
    NEO4J_ACCEPT_LICENSE_AGREEMENT: "no"
    NEO4J_AUTH: "none"
    NEO4J_dbms_connector_bolt_thread__pool__max__size: "400"
    NEO4J_dbms_memory_heap_initial__size: ""
    NEO4J_dbms_memory_heap_max__size: ""
    NEO4J_dbms_memory_pagecache_size: ""
    NEO4J_dbms_security_procedures_unrestricted: "algo.*,apoc.*"
    NEO4J_dbms_default__database:
    NEO4J_apoc_import_file_enabled: "false"
    NEO4J_dbms_allow__format__migration: "true"
    NEO4J_dbms_allow__upgrade: "true"
